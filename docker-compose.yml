version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: route_user
      POSTGRES_PASSWORD: route_pass
      POSTGRES_DB: route_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://route_user:route_pass@postgres:5432/route_db
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pgdata: